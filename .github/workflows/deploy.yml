name: Deploy (CD)

# Loop-v19 — production deploy pipeline. Manual trigger only (workflow_dispatch).
# Inherits CI status by checking the most recent successful run on the
# ref we're deploying from.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: "staging"
        options:
          - staging
          - production
      ref:
        description: "Git ref to deploy (tag/branch/sha)"
        required: true
        type: string
        default: "master"

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false   # don't cancel an in-flight deploy

jobs:
  smoke-test:
    name: Smoke test (post-deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run smoke test
        env:
          BASE_URL: ${{ inputs.environment == 'production' && secrets.PRODUCTION_URL || secrets.STAGING_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::error::Missing ${{ inputs.environment == 'production' && 'PRODUCTION_URL' || 'STAGING_URL' }} secret"
            exit 1
          fi
          bash scripts/smoke-test.sh

  deploy-staging:
    name: Deploy to staging
    needs: smoke-test
    if: github.event.inputs.environment == 'staging' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ secrets.STAGING_URL }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build jar
        working-directory: hey-pickler-server
        run: mvn -B -ntp clean package -DskipTests

      - name: Build Docker image
        working-directory: hey-pickler-server
        run: |
          docker build -t hey-pickler-server:${{ github.sha }} .
          docker tag hey-pickler-server:${{ github.sha }} hey-pickler-server:staging-latest

      - name: Push to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}
        if: env.REGISTRY != ''

      - name: Trigger deploy
        run: |
          echo "Would deploy hey-pickler-server:${{ github.sha }} to staging"
          echo "Current infra: ${{ secrets.STAGING_DEPLOY_HOOK }}"
          # Uncomment in real env:
          # curl -X POST "$STAGING_DEPLOY_HOOK" \
          #   -H "Content-Type: application/json" \
          #   -d "{\"image\":\"hey-pickler-server:${{ github.sha }}\"}"

      - name: Wait + smoke re-run
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
        run: |
          sleep 30
          bash scripts/smoke-test.sh

  deploy-production:
    name: Deploy to production
    needs: smoke-test
    if: github.event.inputs.environment == 'production' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Pre-deploy backup reminder
        env:
          DB_BACKUP_HOOK: ${{ secrets.DB_BACKUP_HOOK }}
        run: |
          if [ -n "$DB_BACKUP_HOOK" ]; then
            curl -X POST "$DB_BACKUP_HOOK"
            echo "Pre-deploy DB backup triggered"
          else
            echo "::warning::No DB_BACKUP_HOOK secret — skipping backup"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build jar
        working-directory: hey-pickler-server
        run: mvn -B -ntp clean package -DskipTests

      - name: Build + push Docker image
        working-directory: hey-pickler-server
        run: |
          docker build -t hey-pickler-server:${{ github.sha }} .
          docker tag hey-pickler-server:${{ github.sha }} hey-pickler-server:production-latest

      - name: Trigger production deploy
        run: |
          echo "Would deploy hey-pickler-server:${{ github.sha }} to production"
          echo "Current infra: ${{ secrets.PRODUCTION_DEPLOY_HOOK }}"
          # Uncomment in real env:
          # curl -X POST "$PRODUCTION_DEPLOY_HOOK" \
          #   -H "Content-Type: application/json" \
          #   -d "{\"image\":\"hey-pickler-server:${{ github.sha }}\"}"

      - name: Wait + smoke re-run
        env:
          BASE_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          sleep 60
          bash scripts/smoke-test.sh

      - name: Notify
        if: always()
        run: |
          echo "::notice::Production deploy ${{ github.sha }} — ${{ job.status }}"
