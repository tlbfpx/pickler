name: Deploy (CD)

# Loop-v19 — production deploy pipeline. Manual trigger only (workflow_dispatch).
#
# Two-stage verification:
#   1. `preflight`  — verifies the target URL secret is configured. Does NOT
#                     require the target to be reachable, so first-time deploys
#                     are not dead-locked by a missing/stale environment.
#   2. post-deploy  — runs scripts/smoke-test.sh against the freshly deployed
#                     target ("Wait + smoke re-run"). This is the real health gate.
#
# NOTE on the deploy *action*: registry push + deploy-hook trigger are gated on
# configured secrets (REGISTRY / *_DEPLOY_HOOK). When unset, the pipeline still
# builds and validates but emits ::warning:: and does NOT ship. Wire the secrets
# up to make it actually deploy.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: "staging"
        options:
          - staging
          - production
      ref:
        description: "Git ref to deploy (tag/branch/sha)"
        required: true
        type: string
        default: "master"

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false   # don't cancel an in-flight deploy

# Least privilege — this pipeline builds an image and triggers external deploy
# webhooks; it does not push back to the repo or create releases, so read-only
# GITHUB_TOKEN is sufficient.
permissions:
  contents: read

jobs:
  preflight:
    name: Preflight (config check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      target_url: ${{ steps.url.outputs.value }}

    steps:
      - name: Verify target URL secret is configured
        id: url
        env:
          PROD_URL: ${{ secrets.PRODUCTION_URL }}
          STAGING_URL: ${{ secrets.STAGING_URL }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ "$ENVIRONMENT" = "production" ]; then
            url="$PROD_URL"; label="PRODUCTION_URL"
          else
            url="$STAGING_URL"; label="STAGING_URL"
          fi
          if [ -z "$url" ]; then
            echo "::error::Missing $label secret — configure it before deploying."
            exit 1
          fi
          echo "value=$url" >> "$GITHUB_OUTPUT"
          echo "Resolved target: $url"

  deploy-staging:
    name: Deploy to staging
    needs: preflight
    if: inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ needs.preflight.outputs.target_url }}
    timeout-minutes: 20
    env:
      # Hoisted to job env so the `if: env.REGISTRY != ''` conditions below
      # actually evaluate (secrets referenced only inside `with:` are NOT
      # exposed as env and cannot be tested in `if`).
      REGISTRY: ${{ secrets.REGISTRY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Build jar
        working-directory: hey-pickler-server
        run: mvn -B -ntp clean package -DskipTests

      - name: Build Docker image
        working-directory: hey-pickler-server
        run: |
          docker build -t hey-pickler-server:${{ github.sha }} .
          docker tag hey-pickler-server:${{ github.sha }} hey-pickler-server:staging-latest

      - name: Login to registry
        if: env.REGISTRY != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Push to registry
        if: env.REGISTRY != ''
        run: |
          docker tag hey-pickler-server:${{ github.sha }} "$REGISTRY/hey-pickler-server:${{ github.sha }}"
          docker tag hey-pickler-server:${{ github.sha }} "$REGISTRY/hey-pickler-server:staging-latest"
          docker push "$REGISTRY/hey-pickler-server:${{ github.sha }}"
          docker push "$REGISTRY/hey-pickler-server:staging-latest"

      - name: Push to registry (skipped — secret not set)
        if: env.REGISTRY == ''
        run: |
          echo "::warning::REGISTRY secret not set — image built locally but NOT pushed. Configure REGISTRY / REGISTRY_USER / REGISTRY_PASS to ship."

      - name: Trigger deploy
        env:
          DEPLOY_HOOK: ${{ secrets.STAGING_DEPLOY_HOOK }}
          # Pass user-controlled ref via env (not ${{ }} interpolation in run:)
          # to avoid shell injection. JSON built with jq for proper escaping.
          REF: ${{ inputs.ref }}
          IMAGE: hey-pickler-server:${{ github.sha }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::warning::STAGING_DEPLOY_HOOK not set — image not shipped. Configure the webhook to deploy $IMAGE."
            exit 0
          fi
          payload=$(jq -nc --arg image "$IMAGE" --arg ref "$REF" '{image:$image, ref:$ref}')
          curl -fsS -X POST "$DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Wait + smoke re-run (the real health gate)
        env:
          BASE_URL: ${{ needs.preflight.outputs.target_url }}
        run: |
          sleep 30
          bash scripts/smoke-test.sh

  deploy-production:
    name: Deploy to production
    needs: preflight
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ needs.preflight.outputs.target_url }}
    timeout-minutes: 30
    env:
      REGISTRY: ${{ secrets.REGISTRY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Pre-deploy backup
        env:
          DB_BACKUP_HOOK: ${{ secrets.DB_BACKUP_HOOK }}
        run: |
          if [ -n "$DB_BACKUP_HOOK" ]; then
            curl -fsS -X POST "$DB_BACKUP_HOOK" && echo "Pre-deploy DB backup triggered"
          else
            echo "::warning::DB_BACKUP_HOOK secret not set — skipping pre-deploy backup. STRONGLY recommended before any production deploy."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Build jar
        working-directory: hey-pickler-server
        run: mvn -B -ntp clean package -DskipTests

      - name: Build Docker image
        working-directory: hey-pickler-server
        run: |
          docker build -t hey-pickler-server:${{ github.sha }} .
          docker tag hey-pickler-server:${{ github.sha }} hey-pickler-server:production-latest

      - name: Login to registry
        if: env.REGISTRY != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Push to registry
        if: env.REGISTRY != ''
        run: |
          docker tag hey-pickler-server:${{ github.sha }} "$REGISTRY/hey-pickler-server:${{ github.sha }}"
          docker tag hey-pickler-server:${{ github.sha }} "$REGISTRY/hey-pickler-server:production-latest"
          docker push "$REGISTRY/hey-pickler-server:${{ github.sha }}"
          docker push "$REGISTRY/hey-pickler-server:production-latest"

      - name: Push to registry (skipped — secret not set)
        if: env.REGISTRY == ''
        run: |
          echo "::warning::REGISTRY secret not set — image built locally but NOT pushed. Configure REGISTRY / REGISTRY_USER / REGISTRY_PASS to ship."

      - name: Trigger production deploy
        env:
          DEPLOY_HOOK: ${{ secrets.PRODUCTION_DEPLOY_HOOK }}
          REF: ${{ inputs.ref }}
          IMAGE: hey-pickler-server:${{ github.sha }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::warning::PRODUCTION_DEPLOY_HOOK not set — image not shipped. Configure the webhook to deploy $IMAGE."
            exit 0
          fi
          payload=$(jq -nc --arg image "$IMAGE" --arg ref "$REF" '{image:$image, ref:$ref}')
          curl -fsS -X POST "$DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Wait + smoke re-run (the real health gate)
        env:
          BASE_URL: ${{ needs.preflight.outputs.target_url }}
        run: |
          sleep 60
          bash scripts/smoke-test.sh

      - name: Notify
        if: always()
        env:
          SHA: ${{ github.sha }}
          REF: ${{ inputs.ref }}
          STATUS: ${{ job.status }}
        run: |
          echo "::notice::Production deploy $SHA ($REF) — $STATUS"
