name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

# Cancel in-flight runs when a PR receives a new push; saves CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (JDK 17 + Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hey_pickler
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile (verify packaging works)
        working-directory: hey-pickler-server
        run: mvn -B -ntp clean package -DskipTests

      - name: Unit tests + coverage gate
        working-directory: hey-pickler-server
        # Loop-v19 — run to the `verify` phase so jacoco:check (bound to
        # verify in pom.xml) actually executes. `mvn test` stops at the test
        # phase and silently skips the 80/60 coverage gate. -DskipITs keeps
        # failsafe from re-running integration tests (they run in the next
        # step with DB/Redis services). Verified locally: unit-only data
        # clears the 80% instruction / 60% branch threshold.
        run: mvn -B -ntp verify -DskipITs -Dtest='!*IntegrationTest'

      - name: Integration tests
        working-directory: hey-pickler-server
        env:
          DB_URL: jdbc:mysql://localhost:3306/hey_pickler?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
          DB_USERNAME: root
          DB_PASSWORD: root
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: mvn -B -ntp test -Dtest='*IntegrationTest'

      # Loop-v17/v19 — OWASP dependency-check. NVD now mandates an API key;
      # without it the goal fails with NoData / NVD-403 (a scan-infra issue,
      # not a code problem). The mvn goal runs under continue-on-error because
      # it ALSO exits non-zero on those infra failures. The real security gate
      # is the next step (CVE gate), which parses the JSON report and blocks
      # only on CRITICAL (CVSS>=9) findings — so a transient NVD outage can't
      # block every PR while a real critical CVE still does.
      - name: Dependency check (CVE scan)
        working-directory: hey-pickler-server
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::warning::NVD_API_KEY secret not set — CVE scan skipped. Apply for a free key (https://nvd.nist.gov/developers/request-an-api-key) and add it as a repo secret before production."
            exit 0
          fi
          mvn -B -ntp verify -DdepCheckCi=true -Dtest='!*IntegrationTest' \
            || echo "::warning::dependency-check goal returned non-zero — scan may be incomplete (NVD rate-limit/outage). See target/dependency-check-report.html."
        continue-on-error: true

      - name: CVE gate (block on CRITICAL CVSS≥9)
        working-directory: hey-pickler-server
        # NOT continue-on-error — this is the hard gate. Skips gracefully (exit 0)
        # when no report exists (scan skipped/failed), so infra issues don't block PRs.
        run: bash ../scripts/cve-gate.sh target/dependency-check-report.json

  frontend:
    name: Frontend (Node 18 + Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 18
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: hey-pickler-admin/package-lock.json

      - name: Install deps
        working-directory: hey-pickler-admin
        run: npm ci

      # NOTE: lint:check currently surfaces ~72 pre-existing errors
      # (no-explicit-any / no-empty / no-unused-vars) tracked as separate
      # tech-debt cleanup. continue-on-error keeps CI green while making the
      # debt visible in run logs. Remove continue-on-error once cleaned up.
      - name: Lint (no autofix)
        working-directory: hey-pickler-admin
        run: npm run lint:check
        continue-on-error: true


      - name: Build
        working-directory: hey-pickler-admin
        run: npm run build
