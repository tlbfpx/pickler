name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

# Cancel in-flight runs when a PR receives a new push; saves CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (JDK 17 + Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hey_pickler
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile (verify packaging works)
        working-directory: hey-pickler-server
        run: mvn -B -ntp clean package -DskipTests

      - name: Unit tests
        working-directory: hey-pickler-server
        run: mvn -B -ntp test -Dtest='!*IntegrationTest'

      - name: Integration tests
        working-directory: hey-pickler-server
        env:
          DB_URL: jdbc:mysql://localhost:3306/hey_pickler?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
          DB_USERNAME: root
          DB_PASSWORD: root
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: mvn -B -ntp test -Dtest='*IntegrationTest'

      # Loop-v17 — OWASP dependency-check (PR #37). Run after unit +
      # integration; NVD_API_KEY secret lifts rate-limit. Without a key
      # the report is still produced but throttled by NVD's public limit.
      - name: Dependency check (CVE scan)
        working-directory: hey-pickler-server
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B -ntp org.owasp:dependency-check-maven:check -DskipTests || true
        continue-on-error: true   # the report is the deliverable; don't fail CI on first hit

  frontend:
    name: Frontend (Node 18 + Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: hey-pickler-admin/package-lock.json

      - name: Install deps
        working-directory: hey-pickler-admin
        run: npm ci

      # NOTE: lint:check currently surfaces ~72 pre-existing errors
      # (no-explicit-any / no-empty / no-unused-vars) tracked as separate
      # tech-debt cleanup. continue-on-error keeps CI green while making the
      # debt visible in run logs. Remove continue-on-error once cleaned up.
      - name: Lint (no autofix)
        working-directory: hey-pickler-admin
        run: npm run lint:check
        continue-on-error: true


      - name: Build
        working-directory: hey-pickler-admin
        run: npm run build
