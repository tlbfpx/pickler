server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hey_pickler?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: NOW()
      logic-not-delete-value: "NULL"

hey-pickler:
  rate-limit:
    # dev 环境放宽到 10x，避免 E2E 并发测试触发限流（生产值在 application-prod.yml）
    login: 2000
    admin: 6000
    admin-anon: 2000
    default: 6000
  scheduler:
    status-transition-enabled: true
  jwt:
    secret: ${JWT_SECRET:HeyPickler2026DevSecretK3y!MustChangeInProd!!}
    app-expiration: ${JWT_APP_EXPIRATION:604800000}
    admin-expiration: ${JWT_ADMIN_EXPIRATION:86400000}
  cors:
    admin-origins: ${CORS_ADMIN_ORIGINS:http://localhost:5173,http://localhost:3000}
    app-origins: ${CORS_APP_ORIGINS:}
  aes:
    # Exactly 16 bytes for AES-128. AesUtil @PostConstruct enforces 16/24/32.
    # NB: previous fallback `PicklerDevAesKey16` was actually 18 bytes and
    # silently zero-padded — any dev phone data encrypted with it will not
    # decrypt after this change. Empty the user.phone column to rebind.
    key: ${AES_KEY:PicklerDevAesKey}
  wechat:
    appid: ${WX_APPID:your-appid}
    secret: ${WX_SECRET:your-secret}
    dev-mode: ${WX_DEV_MODE:true}
