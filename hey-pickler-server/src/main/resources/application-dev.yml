server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hey_pickler?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: NOW()
      logic-not-delete-value: "NULL"

hey-pickler:
  jwt:
    secret: HeyPickler2026SecretKeyForDevOnlyDoNotUseInProd!!
    app-expiration: 604800000
    admin-expiration: 86400000
  aes:
    key: PicklerDevAesKey16
  wechat:
    appid: your-appid
    secret: your-secret
