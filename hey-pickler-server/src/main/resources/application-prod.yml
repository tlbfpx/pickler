server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  flyway:
    enabled: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

hey-pickler:
  jwt:
    secret: ${JWT_SECRET}
    app-expiration: 604800000
    admin-expiration: 86400000
  aes:
    key: ${AES_KEY}
  wechat:
    appid: ${WX_APPID}
    secret: ${WX_SECRET}
