spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: NOW()
      logic-not-delete-value: "NULL"

hey-pickler:
  tier:
    # DEPRECATED: 段位已迁至 tier_config 表（V19，双轨 per-track），TierResolver 直接读 DB。
    # 此配置保留供历史参考，不再被任何代码读取（TierProperties 已删除）。
    keys: [BRONZE, SILVER, GOLD, PLATINUM, DIAMOND, MASTER]
    names: [青铜, 白银, 黄金, 铂金, 钻石, 王者]
    star:
      thresholds: [0, 500, 1200, 2500, 5000, 10000]
    party:
      thresholds: [0, 200, 500, 1200, 2500, 5000]
  placement:
    # Default rank -> points map. Used when an event has no per-event override
    # in event_placement_points. Ranks not in the map yield 0 points (audit row
    # is still written). Override per event via PUT /api/admin/events/{id}/placement-points.
    defaultPoints:
      1: 100
      2: 60
      3: 30
      4: 15
  booking:
    cancel-deadline-hours: 2
    max-concurrent: 5
    complete-grace-hours: 2
    complete-cadence: PT5M
    complete-batch-size: 200
    initial-delay-seconds: 30

# Loop-v17 — actuator endpoints. /health is exposed for Docker HEALTHCHECK
# and Kubernetes liveness probes. All other endpoints are disabled to keep
# the attack surface minimal. /info is also off (no app metadata configured).
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never   # never | always | when_authorized
      probes:
        enabled: true       # /actuator/health/liveness + /readiness
