# =============================================================================
# Hey Pickler Nginx 参考配置
#
# 双 vhost：
#   1. admin.heypickler.com —— Vue3 管理后台 SPA + /api/admin 反代
#   2. api.heypickler.com    —— /api/app 反代（供微信小程序访问）
#
# 部署方式（详见 docs/RUNBOOK.md §1.5）：
#   sudo cp deploy/nginx/heypickler.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/heypickler.conf \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 前置：
#   - SSL 证书已申请并放置到 /etc/ssl/heypickler.{pem,key}
#   - 域名 admin.heypickler.com / api.heypickler.com DNS 已解析到本 ECS
#   - 后端服务 hey-pickler 已 systemctl start，监听 127.0.0.1:8080
# =============================================================================

# -----------------------------------------------------------------------------
# 通用 SSL 与安全 header 片段（在两个 vhost 中 include 复用）
# 如放在 /etc/nginx/snippets/heypickler-ssl.conf：
# -----------------------------------------------------------------------------
# ssl_protocols             TLSv1.2 TLSv1.3;
# ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:...
# ssl_prefer_server_ciphers on;
# ssl_session_cache         shared:SSL:10m;
# ssl_session_timeout       1d;
#
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# add_header X-Frame-Options "SAMEORIGIN" always;
# add_header X-Content-Type-Options "nosniff" always;
# add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# -----------------------------------------------------------------------------

# Admin 后台 —— HTTP 强制跳 HTTPS
server {
    listen 80;
    server_name admin.heypickler.com;
    return 301 https://$server_name$request_uri;
}

# Admin 后台 —— HTTPS + SPA + /api/admin 反代
server {
    listen 443 ssl http2;
    server_name admin.heypickler.com;

    ssl_certificate     /etc/ssl/heypickler.pem;
    ssl_certificate_key /etc/ssl/heypickler.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全 header（响应 200/3xx/4xx/5xx 都要带，所以 always）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 文件上传余量（banner / event image）
    client_max_body_size 10m;

    # 后端反代超时（避免长查询（如批量导入）504）
    proxy_read_timeout   60s;
    proxy_send_timeout   60s;
    proxy_connect_timeout 10s;

    # gzip 静态资源（Vue3 dist）
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # Vue3 SPA 静态资源
    root /var/www/hey-pickler-admin/dist;
    index index.html;

    # SPA history 模式路由 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（hash 化的 js/css 可长期缓存）
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # /api 反代到后端
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如未来接入实时通知）
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    access_log /var/log/nginx/heypickler-admin-access.log;
    error_log  /var/log/nginx/heypickler-admin-error.log warn;
}

# 小程序 API —— HTTPS + /api/app 反代
server {
    listen 443 ssl http2;
    server_name api.heypickler.com;

    ssl_certificate     /etc/ssl/heypickler.pem;
    ssl_certificate_key /etc/ssl/heypickler.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    location /api/app/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/heypickler-api-access.log;
    error_log  /var/log/nginx/heypickler-api-error.log warn;
}
